include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/i18n/**"

linter:
  rules:
    # App (not a published package): API doc comments are not required.
    public_member_api_docs: false
    # The `flutter` sdk dependency conventionally leads the list.
    sort_pub_dependencies: false
